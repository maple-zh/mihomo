name: Docker Build and Push

on:
  push:
    branches: [ main ]
    paths:
      - Dockerfile
      - docker-entrypoint.sh
      - Caddyfile
      - config.yaml.template
      - .github/workflows/docker-build.yml
      - .env
    tags:
      - "v*"
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: mihomo

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      actions: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set environment variables
        run: |
          MI_VERSION=$(grep -E '^MI_VERSION=' .env | cut -d'=' -f2 | tr -d '[:space:]')
          METACUBEXD_VERSION=$(grep -E '^METACUBEXD_VERSION=' .env | cut -d'=' -f2 | tr -d '[:space:]')
          echo "MI_VERSION=$MI_VERSION" >> $GITHUB_ENV
          echo "METACUBEXD_VERSION=$METACUBEXD_VERSION" >> $GITHUB_ENV
          echo "IMAGE_FULL_NAME=${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}" >> $GITHUB_ENV

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ${{ env.IMAGE_FULL_NAME }}:${{ env.MI_VERSION }}
            ${{ env.IMAGE_FULL_NAME }}:latest
          build-args: |
            MI_VERSION=${{ env.MI_VERSION }}
            METACUBEXD_VERSION=${{ env.METACUBEXD_VERSION }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: false
